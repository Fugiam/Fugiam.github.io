<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Martensen</title>
    <style>
        body {
            background-color: #fcfbfa; /* Warmes, edles Off-White */
            color: #2c2a29;           /* Weiches Anthrazit statt hartem Schwarz */
            font-family: "Georgia", "Times New Roman", serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            text-align: center;
            letter-spacing: 0.05em;
        }
        h1 {
            font-size: 2.2rem;
            font-weight: 400;
            margin-bottom: 12px;
        }
        .line {
            width: 40px;
            height: 1px;
            background-color: #d1cbc4; /* Sehr dezente Trennlinie */
            margin: 0 auto 16px auto;
        }
        .subtitle {
            font-size: 0.95rem;
            font-style: italic;
            color: #5c5855;            /* Etwas helleres Grau für den Text */
            line-height: 1.6;
        }
        .heart {
            color: #b85d53;            /* Ein sehr dezentes, mattes Rot für das Herz */
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>martensen.</h1>
        <div class="line"></div>
        <div class="subtitle">
            du & ich <span class="heart">♥️</span><br>
            min lilla solstråle
        </div>
    </div>
</body>
</html>
